version: "3.8"

services:
  embryo:
    build: .
    container_name: embryo-agent
    ports:
      - "8642:8642"
    volumes:
      - embryo-data:/data
      - ./skills:/app/skills:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - EMBRYO_MODEL=${EMBRYO_MODEL:-gpt-4o}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - EMBRYO_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8642/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  embryo-data:
